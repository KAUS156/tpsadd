<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trident Public School - Admission Form</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial;
        background: #f1f5ff;
        display: flex;
        height: 100vh;
    }

    .left-box {
        width: 50%;
        height: 100vh;
        background: url('/Frame 213 (9).png') no-repeat center center/cover;
        animation: slideLeft 1s ease-out;
    }

    .right-box {
        width: 50%;
        background: white;
        padding: 50px;
        box-shadow: -10px 0px 25px rgba(0,0,0,0.2);
        animation: slideRight 1s ease-out;
    }

    @keyframes slideLeft { from { transform: translateX(-100%);} to { transform: translateX(0);} }
    @keyframes slideRight { from { transform: translateX(100%); opacity: 0;} to { transform: translateX(0); opacity: 1;} }

    .logo {
        width: 120px;
        margin: auto;
        display: block;
    }

    h2 { text-align: center; color: #004aad; }
    .school-name { text-align: center; font-size: 24px; font-weight: bold; color: #002f6c; }

    label {
        display: block;
        font-weight: bold;
        margin-top: 20px;
        color: #004aad;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border-radius: 8px;
        border: 2px solid #004aad;
        font-size: 16px;
        outline: none;
    }

    button {
        margin-top: 30px;
        width: 100%;
        padding: 14px;
        font-size: 18px;
        background: #004aad;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #00307a;
        transform: scale(1.05);
    }

    .success-animation {
        display: none;
        text-align: center;
        margin-top: 20px;
        animation: fadeIn 1.2s ease-out;
    }

    .checkmark {
        font-size: 55px;
        color: green;
        font-weight: bold;
        animation: pop 0.5s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0;} to { opacity: 1;} }
    @keyframes pop { from { transform: scale(0.5);} to { transform: scale(1);} }

    @media (max-width: 850px) {
        body { flex-direction: column; }
        .left-box { width: 100%; height: 40vh; }
        .right-box { width: 100%; }
    }
</style>

</head>
<body>

<div class="left-box"></div>

<div class="right-box">

    <img src="/download (4).jpeg" class="logo">

    <div class="school-name">Trident Public School, Chakia</div>
    <h2>Admission Form 2026-27</h2>

<form 
    id="mainForm"
    action="https://script.google.com/macros/s/AKfycbybrptPgEYVvQwf4Lu6r_nC2NNTRklVrRR0HFPdmfCUMQkbyDZYcxvKM97wjT9Q5OcnYg/exec"
    method="post"
>
    <label>Student Name</label>
    <input type="text" name="name" required>

    <label>Class</label>
    <select name="class" required>
        <option value="">Select</option>
        <option>LKG</option>
        <option>UKG</option>
        <option>1st</option>
        <option>2nd</option>
        <option>3rd</option>
        <option>4th</option>
        <option>5th</option>
        <option>6th</option>
        <option>7th</option>
        <option>8th</option>
        <option>9th</option>
        <option>10th</option>
    </select>

    <label>Mobile Number</label>
    <input type="text" name="mobile" required>

    <button type="submit">Submit</button>
</form>

<div class="success-animation" id="successAnimation">
    <div class="checkmark">✔</div>
    <h2>Thank You!</h2>
    <p>Submitting your information...</p>
</div>

</div>

<script>
    document.getElementById("mainForm").addEventListener("submit", function(event) {
        event.preventDefault();

        document.getElementById("successAnimation").style.display = "block";

        setTimeout(() => {
            event.target.submit();

            // ✔ 1.5 sec ke baad THANK YOU PAGE open
            window.location.href = "thankyou.html";
        }, 1500);
    });
</script>

</body>
</html>
