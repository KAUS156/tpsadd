<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trident Public School - Admission Form</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial;
        background: #f1f5ff;
        display: flex;
        height: 100vh;
    }

    /* LEFT SIDE IMAGE */
    .left-box {
        width: 50%;
        height: 50Svh;
        padding-top: 508px;
        
        background: url('/Frame\ 213\ \(9\).png') no-repeat center center/cover;
        animation: slideLeft 1s ease-out;
    }

    /* RIGHT SIDE FORM */
    .right-box {
        width: 50%;
        background: white;
        padding: 50px;
        box-shadow: -10px 0px 25px rgba(0,0,0,0.2);
        animation: slideRight 1s ease-out;
    }

    @keyframes slideLeft {
        from { transform: translateX(-100%); }
        to { transform: translateX(0); }
    }

    @keyframes slideRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .logo {
        width: 120px;
        margin: auto;
        display: block;
    }

    h2 {
        text-align: center;
        color: #004aad;
    }

    .school-name {
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        color: #002f6c;
    }

    label {
        display: block;
        font-weight: bold;
        margin-top: 20px;
        color: #004aad;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border-radius: 8px;
        border: 2px solid #004aad;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    input:focus, select:focus {
        box-shadow: 0 0 10px #004aad;
    }

    button {
        margin-top: 30px;
        width: 100%;
        padding: 14px;
        font-size: 18px;
        background: #004aad;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00307a;
        transform: scale(1.05);
    }

    .success {
        margin-top: 20px;
        color: green;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        display: none;
    }

    /* RESPONSIVE */
    @media (max-width: 850px) {
        body { flex-direction: column; }
        .left-box, .right-box { width: 100%; height: 50vh; }
    }
</style>

</head>

<body>

<div class="left-box"></div>

<div class="right-box">

    <img src="/download (4).jpeg" class="logo">

    <div class="school-name">Trident Public School, Chakia</div>
    <h2>Admission Form 2026-27</h2>

    <form 
        action="https://script.google.com/macros/s/AKfycbzfDqZGhEsDSiRZ16EgwR8O_L1a99QKf-QP36QtEv2wgF4LeZ24xiKMu6PixGGcmhNW/exec"
        method="POST"
        target="hiddenFrame"
    >

        <label>Student Name</label>
        <input type="text" name="name" required>

        <label>Class</label>
        <select name="class" required>
            <option value="">Select Class</option>
            <option>LKG</option>
            <option>UKG</option>
            <option>1st</option>
            <option>2nd</option>
            <option>3rd</option>
            <option>4th</option>
            <option>5th</option>
            <option>6th</option>
            <option>7th</option>
            <option>8th</option>
            <option>9th</option>
            <option>10th</option>
        </select>

        <label>Mobile Number</label>
        <input type="text" name="mobile" required>

        <button type="submit">Submit</button>
    </form>

    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <div class="success" id="successMsg">
        ✔ Thank you for sharing your information!
    </div>

</div>

<script>
    // success message show animation
    document.querySelector("form").addEventListener("submit", () => {
        setTimeout(() => {
            document.getElementById("successMsg").style.display = "block";
        }, 1000);
    });
</script>

</body>
</html>
