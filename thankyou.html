<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - Trident Public School</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #035ccf, #023fb1);
        text-align: center;
        padding-top: 80px;
        animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .container {
        background: white;
        width: 100%;
        max-width: 1485px;
        margin-top: -80PX;
        max-height: 1400px;
        padding: 40px;
        
        box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        animation: pop 0.7s ease-out;
    }

    @keyframes pop {
        from { transform: scale(0.7); }
        to { transform: scale(1); }
    }

    .logo {
        width: 120px;
        margin-bottom: 20px;
        animation: float 2.5s infinite ease-in-out;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0); }
    }

    .checkmark {
        font-size: 70px;
        color: green;
        animation: zoom 0.5s ease-out;
    }

    @keyframes zoom {
        from { transform: scale(0); }
        to { transform: scale(1); }
    }

    h2 {
        color: #004aad;
        font-size: 28px;
        margin-top: 15px;
    }

    p {
        font-size: 18px;
        color: #333;
        margin-top: 10px;
    }

    .btn {
        margin-top: 25px;
        display: inline-block;
        padding: 14px 30px;
        background: #004aad;
        color: white;
        font-size: 18px;
        border-radius: 10px;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn:hover {
        background: #002f6c;
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="container">
    <img src="/download (4).jpeg" class="logo">

    <div class="checkmark">✔</div>

    <h2>Thank You!</h2>
    <p>Your information has been submitted successfully.</p>
    <p>We will contact you soon.</p>

    <a href="index.html" class="btn">Back to Home</a>
</div>

</body>
</html>
